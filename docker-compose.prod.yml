name: aiphilosophy

services:
  backend:
    image: ghcr.io/hadiabu/ai-philosophy-backend:latest
    pull_policy: always
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    image: ghcr.io/hadiabu/ai-philosophy-frontend:latest
    pull_policy: always
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
