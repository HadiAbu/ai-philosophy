upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:80;
}

# -----------------------------
# HTTP (ACME + redirect)
# -----------------------------
server {
    listen 80;
    server_name aiphilo.pathofbalance.io;

    # Let's Encrypt validation MUST stay accessible
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
        default_type "text/plain";
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# -----------------------------
# HTTPS (main app)
# -----------------------------
server {
    listen 443 ssl http2;
    server_name aiphilo.pathofbalance.io;

    ssl_certificate /etc/letsencrypt/live/aiphilo.pathofbalance.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aiphilo.pathofbalance.io/privkey.pem;

    # Backend API
    location /api {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}