# Rate limiting zones (declared at http level via conf.d include)
# auth_zone:  10 req/min — covers register, login, logout, refresh
# api_zone:   60 req/min — all other API endpoints
limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=api_zone:10m  rate=60r/m;

upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:80;
}

# -----------------------
# HTTP → HTTPS redirect
# -----------------------
server {
    listen 80;
    server_name aiphilo.pathofbalance.io;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# -----------------------
# HTTPS SERVER
# -----------------------
server {
    listen 443 ssl http2;
    server_name aiphilo.pathofbalance.io;

    ssl_certificate /etc/letsencrypt/live/aiphilo.pathofbalance.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aiphilo.pathofbalance.io/privkey.pem;

    # Auth endpoints — tighter rate limit
    location /api/auth {
        limit_req zone=auth_zone burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # General API
    location /api {
        limit_req zone=api_zone burst=20 nodelay;
        limit_req_status 429;
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}